apiVersion: v1
kind: ConfigMap
metadata:
  name: replicator
  labels:
    app: traefik-proxy
data:
  replicator.yaml: |
    http:
      routers:
        defaults:
          entryPoints:
            - web
          rule: PathPrefix(`/`)
          middlewares:
            - soveren
          service: upstream
      services:
        upstream:
          loadBalancer:
            servers:
              - url: http://host:80/

---
apiVersion: v1
kind: Service
metadata:
  labels:
    stack: soveren
    app: detection-tool
  name: soveren-detection-tool
spec:
  ports:
    - name: "detection-tcp"
      port: 8000
  selector:
    stack: soveren
    app: detection-tool

---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    stack: soveren
    app: detection-tool
  name: soveren-detection-tool
spec:
  replicas: 1
  selector:
    matchLabels:
      stack: soveren
      app: detection-tool
  template:
    metadata:
      labels:
        stack: soveren
        app: detection-tool
    spec:
      containers:
        - image: soveren/detection-tool:latest
          imagePullPolicy: IfNotPresent
          name: detection-tool
          readinessProbe:
            tcpSocket:
              port: 8000
            timeoutSeconds: 3
          ports:
            - name: "detection-tcp"
              containerPort: 8000
          resources:
            requests:
              memory: "1024Mi"
              cpu: "250m"
            limits:
              memory: "2048Mi"
              cpu: "2000m"
      restartPolicy: Always
